services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guardiola_foundry
      POSTGRES_USER: guardiola_foundry
      POSTGRES_PASSWORD: guardiola_foundry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardiola_foundry -d guardiola_foundry"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
