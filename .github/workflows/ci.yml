name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: guardiola_foundry
          POSTGRES_USER: guardiola_foundry
          POSTGRES_PASSWORD: guardiola_foundry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U guardiola_foundry -d guardiola_foundry"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TZ: UTC
      NODE_ENV: test
      PORT: 3333
      HOST: localhost
      APP_URL: http://localhost:3333
      APP_KEY: ci-only-app-key-with-at-least-32-characters
      LOG_LEVEL: info
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: guardiola_foundry
      DB_PASSWORD: guardiola_foundry
      DB_DATABASE: guardiola_foundry
      VITE_API_URL: http://localhost:3333

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:status
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
